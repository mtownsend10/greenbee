<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Assorted beeswax wraps">
  <defs>
    <pattern id="a-honey" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 56,17 56,45 30,60 4,45 4,17" fill="none" stroke="#D99410" stroke-width="2"/>
    </pattern>
    <pattern id="a-floral" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="6" fill="#FF6B5B"/>
      <circle cx="60" cy="60" r="6" fill="#FF6B5B"/>
      <circle cx="60" cy="20" r="3" fill="#5B8A3A"/>
      <circle cx="20" cy="60" r="3" fill="#5B8A3A"/>
      <path d="M40 36 Q 44 40 40 44 Q 36 40 40 36 Z" fill="#F4B324"/>
    </pattern>
    <pattern id="a-leaves" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M35 10 Q 50 25 35 40 Q 20 25 35 10 Z" fill="#5B8A3A" opacity="0.85"/>
      <path d="M10 50 Q 25 60 10 70 Q 0 60 10 50 Z" fill="#2F4A2F"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="#FFFAEB"/>
  <!-- Wrap 3 (back) -->
  <g transform="translate(110,180) rotate(-14)">
    <rect width="280" height="280" rx="14" fill="#FCD66B"/>
    <rect width="280" height="280" rx="14" fill="url(#a-honey)" opacity="0.9"/>
    <rect width="280" height="280" rx="14" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-dasharray="6 8"/>
  </g>
  <!-- Wrap 2 (middle) -->
  <g transform="translate(170,150) rotate(4)">
    <rect width="280" height="280" rx="14" fill="#FFFAEB"/>
    <rect width="280" height="280" rx="14" fill="url(#a-floral)"/>
    <rect width="280" height="280" rx="14" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-dasharray="6 8"/>
  </g>
  <!-- Wrap 1 (front) -->
  <g transform="translate(230,200) rotate(-6)">
    <rect width="260" height="260" rx="14" fill="#5B8A3A"/>
    <rect width="260" height="260" rx="14" fill="url(#a-leaves)" opacity="0.6"/>
    <rect width="260" height="260" rx="14" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-dasharray="6 8"/>
  </g>
</svg>
