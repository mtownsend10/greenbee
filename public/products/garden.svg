<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Garden beeswax wrap">
  <defs>
    <pattern id="g-floral" width="100" height="100" patternUnits="userSpaceOnUse">
      <g transform="translate(50,50)">
        <g fill="#FF6B5B">
          <ellipse cx="0" cy="-14" rx="6" ry="10"/>
          <ellipse cx="14" cy="0" rx="10" ry="6"/>
          <ellipse cx="0" cy="14" rx="6" ry="10"/>
          <ellipse cx="-14" cy="0" rx="10" ry="6"/>
        </g>
        <circle r="6" fill="#F4B324"/>
      </g>
      <g transform="translate(0,0)" fill="#5B8A3A">
        <ellipse cx="20" cy="20" rx="3" ry="6"/>
        <ellipse cx="80" cy="80" rx="3" ry="6"/>
      </g>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="#FFFAEB"/>
  <g transform="translate(140,160) rotate(-6)">
    <rect width="300" height="300" rx="14" fill="#FFFAEB"/>
    <rect width="300" height="300" rx="14" fill="url(#g-floral)"/>
    <rect width="300" height="300" rx="14" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-dasharray="6 8"/>
  </g>
  <g transform="translate(220,220) rotate(10)">
    <rect width="280" height="280" rx="14" fill="#5B8A3A"/>
    <rect width="280" height="280" rx="14" fill="url(#g-floral)" opacity="0.6"/>
    <rect width="280" height="280" rx="14" fill="none" stroke="#FFFAEB" stroke-width="3" stroke-dasharray="6 8"/>
  </g>
</svg>
